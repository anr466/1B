              - paragraph [ref=e708]: Once you've set up the Dart and Flutter MCP server with a client, the Dart and Flutter MCP server enables the client to not only reason about your project's context but also to take action with tools.
              - paragraph [ref=e709]:
                - text: The
                - link "Large Language Model (LLM)" [ref=e710] [cursor=pointer]:
                  - /url: https://developers.google.com/machine-learning/resources/intro-llms
                - text: decides which tools to use and when, so you can focus on describing your goal in natural language. Let's see this in action with a couple of examples using GitHub Copilot's Agent mode in VS Code.
              - generic [ref=e711]:
                - heading "Fix a runtime layout error in a Flutter app" [level=3] [ref=e712]
                - link "Link to 'Fix a runtime layout error in a Flutter app' section" [ref=e713] [cursor=pointer]:
                  - /url: "#fix-a-runtime-layout-error-in-a-flutter-app"
                  - text: "#"
              - paragraph [ref=e714]: "We've all been there: you build a beautiful UI, run the app, and are greeted by the infamous yellow-and-black stripes of a RenderFlex overflow error. Instead of manually debugging the widget tree, you can now ask your AI assistant for help with a prompt similar to the following:"
              - blockquote [ref=e715]:
                - paragraph [ref=e716]: Check for and fix static and runtime analysis issues. Check for and fix any layout issues.
              - paragraph [ref=e717]: "Behind the scenes, the AI agent uses the Dart and Flutter MCP server's tools to:"
              - list [ref=e718]:
                - listitem [ref=e719]: "See the error: It uses a tool to get the current runtime errors from the running application."
                - listitem [ref=e720]: "Inspect the UI: It accesses the Flutter widget tree to understand the layout that is causing the overflow."
                - listitem [ref=e721]: "Apply a fix: Armed with this context, it applies a fix and checks once more for any remaining errors."
              - paragraph [ref=e722]: You can then keep or undo the code changes.
              - generic [ref=e723]:
                - heading "Add new functionality with package search" [level=3] [ref=e724]
                - link "Link to 'Add new functionality with package search' section" [ref=e725] [cursor=pointer]:
                  - /url: "#add-new-functionality-with-package-search"
                  - text: "#"
              - paragraph [ref=e726]: "Imagine you need to add a chart to your app. Which package should you use? How do you add it and write the boilerplate? The Dart and Flutter MCP server can streamline this entire process with a prompt similar to the following:"
              - blockquote [ref=e727]:
                - paragraph [ref=e728]: Find a suitable package to add a line chart that maps the number of button presses over time.
              - paragraph [ref=e729]: "The AI agent now acts as a true assistant:"
              - list [ref=e730]:
                - listitem [ref=e731]:
                  - text: "Find the right tool: It uses the"
                  - code [ref=e732]: pub_dev_search
                  - text: tool to find popular and highly-rated charting libraries.
                - listitem [ref=e733]:
                  - text: "Manage dependencies: After you confirm its choice, such as"
                  - link "package:fl_chart" [ref=e734] [cursor=pointer]:
                    - /url: https://pub.dev/packages/fl_chart
                    - code [ref=e735]: package:fl_chart
                  - text: ", it uses a tool to add the package as a dependency."
                - listitem [ref=e736]: "Generate the code: It generates the new widget code, complete with boilerplate for a line chart that it places in the UI. It even self-corrects syntax errors introduced during the process. You can customize further from there."
              - paragraph [ref=e737]:
                - text: What used to be a multi-step process of research, reading documentation, editing
                - code [ref=e738]: pubspec.yaml
                - text: ", and writing the appropriate code in your app, is now a single request."
