name: trading_app
description: "1B Trading App - نظام تداول ذكي مع تصاميم متعددة"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & API
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2

  # UI
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  pin_code_fields: ^8.0.1

  # Charts
  fl_chart: ^1.1.1

  # Auth & Security
  local_auth: ^2.3.0
  encrypt: ^5.0.3

  # Firebase (Push Notifications)
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.20.2
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon_1b.png
  min_sdk_android: 21
  adaptive_icon_background: "#040507"
  adaptive_icon_foreground: assets/images/app_icon_1b_foreground.png
  adaptive_icon_foreground_inset: 8

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-Black.ttf
          weight: 900
