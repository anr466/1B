// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.22"
        // ✅ تحديد إصدار Firebase BOM متوافق مع AGP 7.4.2
        firebaseBoMVersion = "32.3.1"
    }
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.3.15")
    }
}


allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
        maven { url "https://maven.google.com" }
        // ✅ React Native Maven repository
        maven { url("$rootDir/../node_modules/react-native/android") }
    }
}

// ✅ إصلاح توافق React Native مع Firebase modules
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.configurations.all {
                resolutionStrategy {
                    // ✅ استبدال react-native القديم بـ react-android الجديد (RN 0.72+)
                    dependencySubstitution {
                        substitute module('com.facebook.react:react-native') using module('com.facebook.react:react-android:0.72.17')
                    }
                }
            }
        }
    }
}

